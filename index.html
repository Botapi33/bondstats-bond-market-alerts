<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bond Alerts | BondStats</title>
  <style>
    body {
      font-family: Arial;
      background: #0e1117;
      color: white;
      padding: 40px;
      max-width: 800px;
      margin: auto;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .box {
      background: #161b22;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .alert-item {
      background: #1f2937;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
    }

    .success { color: #22c55e; }
    .error { color: #ef4444; }
    .info { color: #3b82f6; }
  </style>
</head>

<body>

<h1>Bond Market Alerts</h1>

<div class="box">
  <h3>Create Alert</h3>

  <input id="email" placeholder="Email" />
  <input id="country" placeholder="Country (e.g. US)" />
  <input id="metric" placeholder="Metric (yield)" />
  <input id="operator" placeholder="gt or lt" />
  <input id="threshold" placeholder="Threshold (e.g. 5)" />

  <button id="createBtn">Create Alert</button>
  <p id="formMessage"></p>
</div>

<div class="box">
  <h3>Load Alerts</h3>

  <input id="lookupEmail" placeholder="Email" />
  <button id="loadBtn">Load Alerts</button>

  <p id="loadMessage"></p>
  <div id="alertsList"></div>
</div>

<script>
const API_BASE = "https://ufifxuzrjpcoubsslomd.supabase.co/functions/v1";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmaWZ4dXpyanBjb3Vic3Nsb21kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MzA4NDgsImV4cCI6MjA5MTAwNjg0OH0.xYYLj28EbBtkQZZQtEmFZgVFDB5aPtEpAnMjRRjLUBo";

function headers() {
  return {
    "Content-Type": "application/json",
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": "Bearer " + SUPABASE_ANON_KEY
  };
}

function msg(id, text, type) {
  const el = document.getElementById(id);
  el.innerText = text;
  el.className = type;
}

async function createAlert() {
  const payload = {
    email: document.getElementById("email").value,
    country: document.getElementById("country").value,
    metric: document.getElementById("metric").value,
    operator: document.getElementById("operator").value,
    threshold: Number(document.getElementById("threshold").value)
  };

  msg("formMessage", "Creating...", "info");

  try {
    const res = await fetch(API_BASE + "/alerts-create", {
      method: "POST",
      headers: headers(),
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.error);

    msg("formMessage", "Alert created ✅", "success");

  } catch (e) {
    msg("formMessage", "Error: " + e.message, "error");
  }
}

async function loadAlerts() {
  const email = document.getElementById("lookupEmail").value;

  msg("loadMessage", "Loading...", "info");

  try {
    const res = await fetch(API_BASE + "/alerts-list", {
      method: "POST",
      headers: headers(),
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.error);

    const list = document.getElementById("alertsList");
    list.innerHTML = "";

    data.alerts.forEach(a => {
      const div = document.createElement("div");
      div.className = "alert-item";
      div.innerText = `${a.country} | ${a.metric} ${a.operator} ${a.threshold}`;
      list.appendChild(div);
    });

    msg("loadMessage", "Loaded " + data.alerts.length + " alerts", "success");

  } catch (e) {
    msg("loadMessage", "Error: " + e.message, "error");
  }
}

document.getElementById("createBtn").onclick = createAlert;
document.getElementById("loadBtn").onclick = loadAlerts;

</script>

</body>
</html>
